<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Details</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <a href="index.html" class="back-link">← Back to Articles</a>
  </header>

  <div class="article-info">
    <h2 id="article-title"></h2>
    <p id="article-description"></p>
    <a id="article-link" class="article-link" href="#" target="_blank" style="display: none;">
      <span>🔗</span> View Original Article
    </a>
  </div>

  <div class="review-summary">
    <h3>Review Summary</h3>
    <div id="summary-grid" class="summary-grid">
      <!-- Summary items will be populated by JS -->
    </div>
  </div>

  <div class="review-form">
    <h3>Add Your Review</h3>
    <form id="review-form" onsubmit="event.preventDefault(); submitReview(getArticleId());">
      <div class="star-rating" id="star-rating-container">
        <!-- Star ratings will be populated by JS -->
      </div>
      <div class="form-group">
        <label for="comment">Comment (optional)</label>
        <textarea id="comment" placeholder="Share your thoughts about this article..."></textarea>
      </div>
      <button type="submit" class="submit-btn" style="width: 100%;">Submit Review</button>
    </form>
  </div>

  <div id="review-list" class="review-list">
    <!-- Reviews will be populated by JS -->
  </div>

  <script src="storage.js"></script>
  <script src="app.js"></script>
  <script>
    function getArticleId() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('id');
    }

    const articleId = getArticleId();
    if (articleId) {
      renderArticlePage(articleId);
    } else {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
